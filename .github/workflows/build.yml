name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Las revisiones internas de v4 ya apuntan a entornos actualizados

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            build-essential libstdc++-12-dev \
            autoconf automake libtool libtool-bin m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build \
            libjpeg-dev libpng-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython<3.0.0"
          pip install virtualenv pycparser
          pip install python-for-android
          pip install buildozer

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Bootstrap Android SDK in Buildozer's path
        run: |
          BUILDOZER_SDK="${HOME}/.buildozer/android/platform/android-sdk"
          mkdir -p "${BUILDOZER_SDK}"

          # 1. Descargar cmdline-tools de Google
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -O /tmp/cmdline-tools.zip

          # 2. Instalar en la ruta estructural correcta
          mkdir -p /tmp/ct-extract
          unzip -q /tmp/cmdline-tools.zip -d /tmp/ct-extract
          mkdir -p "${BUILDOZER_SDK}/cmdline-tools/latest"
          cp -r /tmp/ct-extract/cmdline-tools/* "${BUILDOZER_SDK}/cmdline-tools/latest/"

          SDKMANAGER="${BUILDOZER_SDK}/cmdline-tools/latest/bin/sdkmanager"

          # 3. Aceptar licencias vía sdkmanager nativo
          yes | "${SDKMANAGER}" --sdk_root="${BUILDOZER_SDK}" --licenses || true

          # 4. Preinstalar paquetes necesarios
          yes | "${SDKMANAGER}" --sdk_root="${BUILDOZER_SDK}" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" || true

      - name: Clean previous local build artifacts
        run: |
          rm -rf .buildozer/android/platform/build-*
          rm -rf bin

      - name: Build APK
        run: |
          # El "yes |" asegura que si Buildozer pide confirmar algo en consola, no se quede congelado
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: bin/*.apk

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ~/.buildozer/buildozer.log
            .buildozer/android/platform/build-*/build/other_builds/
          if-no-files-found: ignore
